<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes & Fornecedores - Sistema de Estoque</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <header>
        <h1><i class="fa-solid fa-boxes-stacked"></i> Sistema de Estoque</h1>
        <nav class="nav-principal">
            <a href="index.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="produtos.html"><i class="fa-solid fa-list"></i> Produtos</a>
            <a href="cadastro.html"><i class="fa-solid fa-plus"></i> Cadastro</a>
            <a href="movimentacoes.html"><i class="fa-solid fa-clock-rotate-left"></i> Movimentações</a>
            <a href="contatos.html" class="ativo"><i class="fa-solid fa-users"></i> Contatos</a>
        </nav>
    </header>

    <div class="container">

        <h2><i class="fa-solid fa-users"></i> Contatos (Clientes e Fornecedores)</h2>

        <div class="grid-duas-colunas">
            
            <section>
                <h3><i class="fa-solid fa-user-plus"></i> Novo Contato</h3>
                <form id="formContato" style="margin-top: 15px;">
                    <label for="contatoNome">Nome ou Razão Social</label>
                    <input type="text" id="contatoNome" required placeholder="Ex: João da Silva ou Distribuidora Sul">

                    <label for="contatoTipo">Tipo de Contato</label>
                    <select id="contatoTipo" required>
                        <option value="" disabled selected>Selecione o tipo...</option>
                        <option value="Cliente">Cliente</option>
                        <option value="Fornecedor">Fornecedor</option>
                    </select>

                    <label for="contatoTelefone">Telefone</label>
                    <input type="text" id="contatoTelefone" placeholder="Ex: (42) 99999-9999">

                    <label for="contatoEmail">E-mail</label>
                    <input type="email" id="contatoEmail" placeholder="Ex: contato@empresa.com">

                    <button type="submit" style="width: 100%;"><i class="fa-solid fa-save"></i> Salvar Contato</button>
                </form>
            </section>

            <section>
                <h3><i class="fa-solid fa-address-book"></i> Lista de Contatos</h3>
                
                <div class="filtros-produtos" style="margin-top: 15px;">
                    <input type="text" id="filtroContatos" placeholder="Pesquisar por nome...">
                    <select id="filtroTipoContato">
                        <option value="">Todos os tipos</option>
                        <option value="Cliente">Clientes</option>
                        <option value="Fornecedor">Fornecedores</option>
                    </select>
                </div>
                
                <p id="contadorContatos" class="contador"></p>
                <div id="listaContatos"></div>
            </section>

        </div>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/contatos.js"></script>

</body>

</html>
