<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Estoque</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <header>
        <h1><i class="fa-solid fa-boxes-stacked"></i> Sistema de Estoque</h1>
        <nav class="nav-principal">
            <a href="index.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="produtos.html"><i class="fa-solid fa-list"></i> Produtos</a>
            <a href="cadastro.html" class="ativo"><i class="fa-solid fa-plus"></i> Cadastro</a>
            <a href="movimentacoes.html"><i class="fa-solid fa-clock-rotate-left"></i> Movimentações</a>
            <a href="contatos.html"><i class="fa-solid fa-users"></i> Contatos</a>
        </nav>
    </header>

    <div class="container">

        <h2>Novo Produto</h2>

        <form id="formProduto">

            <label>Categoria</label>
            <select id="categoria" required>
                <option value="" disabled selected>Selecione uma categoria...</option>
                <option value="Eletrônicos">Eletrônicos</option>
                <option value="Vestuário">Vestuário</option>
                <option value="Alimentos">Alimentos</option>
                <option value="Papelaria">Papelaria</option>
                <option value="Outros">Outros</option>
            </select>

            <label>Nome do Produto</label>
            <input type="text" id="nome" required>

            <label>Preço Unitário (R$)</label>
            <input type="number" id="preco" step="0.01" min="0" required>

            <label>Quantidade</label>
            <input type="number" id="quantidade" min="1" required>

            <label>Estoque Mínimo (alerta)</label>
            <input type="number" id="estoqueMinimo" min="0" value="5" placeholder="Quantidade mínima antes do alerta">

            <label for="fornecedor">Fornecedor</label>
            <select id="fornecedor">
                <option value="">Selecione um fornecedor (opcional)...</option>
            </select>

            <button type="submit"><i class="fa-solid fa-save"></i> Salvar Produto</button>

        </form>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/cadastro.js"></script>

</body>

</html>
